name: Refresh static World Cup data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python build_static.py

      - name: Create refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Refresh static World Cup data
          title: Refresh static World Cup data
          body: |
            Automated hourly refresh for World Cup data.

            This updates the static `public` build from the latest available sources.
          branch: automation/refresh-static-world-cup-data
          base: main
          add-paths: |
            public
          delete-branch: true

